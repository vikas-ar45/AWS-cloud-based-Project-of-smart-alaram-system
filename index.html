<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Alarm System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🚨 Smart Alarm System</h1>
                <p class="subtitle">AWS SNS Integrated Alert Management</p>
            </div>
        </header>

        <main>
            <section class="form-section">
                <div class="form-container">
                    <h2>Send Alarm Notification</h2>
                    
                    <form id="alarmForm">
                        <div class="form-group">
                            <label for="subject">Subject *</label>
                            <input type="text" id="subject" placeholder="Enter alarm subject" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" placeholder="Enter detailed alarm message" rows="4" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="severity">Severity *</label>
                                <select id="severity" required>
                                    <option value="">Select Severity</option>
                                    <option value="LOW">🟢 LOW</option>
                                    <option value="MEDIUM">🟡 MEDIUM</option>
                                    <option value="HIGH">🔴 HIGH</option>
                                    <option value="CRITICAL">⛔ CRITICAL</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="phoneNumber">Phone Number (Optional)</label>
                                <input type="tel" id="phoneNumber" placeholder="+1234567890">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email (Optional)</label>
                            <input type="email" id="email" placeholder="user@example.com">
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">Send Alarm</button>
                            <button type="button" class="btn btn-secondary" onclick="testAlarm()">Test Alarm</button>
                            <button type="reset" class="btn btn-reset">Clear Form</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="status-section">
                <div class="status-container">
                    <h2>System Status</h2>
                    <div id="statusBox" class="status-box">
                        <p id="healthStatus">Checking system health...</p>
                    </div>
                </div>
            </section>

            <section class="logs-section">
                <div class="logs-container">
                    <h2>Recent Alarms</h2>
                    <div id="alarmLogs" class="alarm-logs">
                        <p class="empty-log">No alarms sent yet</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Smart Alarm System. Powered by AWS SNS & Spring Boot</p>
        </footer>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/script.js"></script>
</body>
</html>
